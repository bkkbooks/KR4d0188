body:
  text: 少陽集目録别集類三宋卷一上書上卷二上書中卷三上書下卷四書贊卷五詩詞卷六附録臣等謹案少陽集五卷附録一卷宋太學生陳東撰東字少陽鎮江丹陽人事迹詳宋史本傳其集刻於元大德中者曰盡忠録凡八卷編次頗嫌錯雜刋於國朝康熙中者曰少陽文集凡十卷前五卷皆東遺文後五卷則本傳行狀及他書論贊今存遺文五卷附録史傳一篇行狀一篇及欽宗省敕一篇髙宗諭旨七篇為第六卷他皆汰之東以諸生憤切時事伏闕上書糾蔡京童貫諸人可謂直矣第於時國步方危而煽動十餘萬人震警庭陛至於壞院鼓臠中涓迹類亂民亦乖大體南宋末太學之橫至於進退大臣莫可裁制其胚胎實兆於此後應詔再出卒以此為黃潛善所搆雖小人隂險工於擠排亦東等有以致之矣第以心在國家言皆剴切且能批摘權臣冒萬死以伸公憤故南宋以來儒者以忠義豫之而遺文亦至今傳述焉乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:914e1706734d4e30bfa93e45b9268d8aec44323d65070c8153ac83b67f35f0c3
