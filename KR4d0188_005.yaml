body:
  text: 少陽集巻五宋陳東撰詩詞大雪與同舍生飲太學初筮齋飛亷强攪朔風起朔雪飄飄灑中土雪花着地不肯消億萬蒼生受寒苦天公剛被陰雲遮那知世人凍死如亂麻人間愁歎之聲不忍聽誰肯採摭傳說聞達太上家地行賤臣無言責私憂過計如杞國揭雲直欲上天門首為蒼生訟風伯天公倘信臣言憐世間開陽闔陰不作難便驅飛亷囚下鄷都獄急使飛雪作水流潺潺東方日出能照耀坐令和氣生人寰翼按玉川月蝕詩昌黎風伯訟合先生此詩遂成三絶律詩三十韻僅存二韻山嶽遭埋沒乾坤着蔽䝉已成堆積勢漸費掃除功自許昌如蔡與石士繇酌别一章太學諸生出許昌抱關夫子特相將輕衣短㡌秋風裏瘦馬羸童古柳傍黄葉翻翻慘離思濁醪沃沃澆愁腸欲知此别情懐惡正是平生氣味長公歸且作詩書伴我去還依鴻鴈行酒䦨徑渡石橋子回首髙城揮夕陽與虞章舜卿二表弟季明游兼勝亭有作危亭兼雅勝勝景足奇觀湖水涵天入山雲帶雨蟠千松偃夜月萬竹撼春寒玉井汲甘冷塵縁那得干野曠湖山逺林深松竹幽舊題看壁立前事逐萍浮荏苒荒三徑依稀度九秋故人應念我雅會莫遲留三子皆吾弟阿章才更豪風流江左舊句法杜陵髙雅志在五馬壯心連六鰲時哉偶未與日且醉金舠次韻同舍李冲壽夜坐時引金盃㧞劍看光芒髙徹斗牛寒要令世事從心淡可謂人情徹鼻酸經術豈應窮皓首文章何用苦雕肝吾徒行與功名會莫作覊人日夜歎秋夜獨坐有感一章奉呈師說令尹奉議光明主簿虞章依依客舘夜燃膏子夜覊愁無處逃閑炷爐香聴夜雨快斟盃酒讀離騷休驚時節云何速獨弔古人殊不遭一陣曉寒催畫角朝來爽氣碧山髙彦雋母挽章二首人生五福古難全天賦夫人獨不偏内行無慚詩婦孝母儀何啻穆姜賢庭幃已歎芳魂獨宗族空留舊事傳惟有南陔多少恨忍看松栢鎖寒烟少馳賢孝譽來配潁川家雖奪共姜誓曽無賢母瑕一鄉䝉愛惠百口藉生涯享福踰中壽歸與勿怨嗟穎川二絶我家本出穎川住幾世不曽歸潁川今我暫來忽暫去太丘風流誰與傳我來穎川何所見青青古柏古城傍知是荀陳手親植令人不覺淚行行次韻士繇惜别男兒自有四方志離别豈能動剛腸功名未遂身未老白眼青青頻舉觴次韻邵予可彈琴二首雷公徽玉粲明星照出師襄指下聲可憐此地無人識喚作新來黒瘦筝漫說朱絃大古清政無矇瞽在周庭髙山流水本無事安用區區里耳聴與士繇遊金山翼日分袂二絶早别金山恰曉鐘離㠶分破一江風𤓰洲渡口波聲逺後夜相思明月中京口𤓰洲一水間秋風重約到金山江山自為離人好不為離人數往還題吳公輔庵一徑縈廻屋數間我來聊欲寄清閒道人杖履知何處空鎻烟霞萬疊山茶偏愛君家碧玉盤建溪雲脚未嘗亁書生自恨無金換聊以詩章乞數團送友人䘮二絶欲認青帘索酒嘗俄驚丹旐送君䘮吕莊編戸傷心切愁對清風想杜康初成大厦勢巍巍有意于門駟馬車未乾壁土君先已賀燕翻隨弔鶴飛徐氏哀詞代作憶昔常隨祖母過登堂共慶尚埀胡十年未逺皆流蕩地下相逢果有無和邵予可賣俸豆休論斥鹵與膏腴豆藿連阡稻麥無舉世紛紛寶魚目投人慎勿以明珠謁王樂道之子聞方飯絶客一絶晚生恨不及前軰來訪諸郎觀典型吐握風流何寂寞滿林風竹自秋聲詠桃花菊一章潘郎嘗望塵陶令亟避俗胸中定何如清濁在一矚河陽艶桃李彭澤鬱秋菊所好邈如許二子殊品目詩人易評量忍使混衡斛當使氷鑑磨要遣鬚眉燭勿容脂粉姿濫入珪璋録神仙真渺茫浪說武陵谷不如臨清潭飲水樂自足誰令春雨紅㸃汚秋株緑寒根豈無知風霜怒應蓄令尹非安仁腰帶肯輕束脫巾漉酒漿黄花泛新馥春日偶題驅除睡思茶甌外收拾春光酒盞中萬種窮愁渾不問世間此樂幾人同䟦黄魯直買米帖廣文弦歌飯不足要是古來賢達人山谷有錢能買米比之魯公殊未貧尹舘作此覓酒召李順之飲今日天色惡酒壺恰已空何來進童子挈榼問主翁主翁正對客兀坐書堂中諸生功課畢鼔瑟歌醉翁愛酒欲出門杖頭無青銅春衣典又盡搜索計已窮酒興不可遏不免作詩呼進童空壺挈將納宅庫為我却致䨥灰紅得酒須尋愛酒伴更煩與召隴西翁送黄仲達歸温州仍寄諸友長安市上喜相逢傾葢恩情久要同幾載暌違勞想夢一樽邂逅冩情衷家山柑橘正酣露江岸㠶檣忽飽風歸去借聲詢舊友項髯方浪薛芹宫項邦髯方正仲浪薛公才多遇新除齊州教授謝温州黄仲達送鄂州𤓰虀黄夫子從汶上來三束𤓰􅐽送風土應知我亦困虀鹽肯食沽酒與市脯食肉者鄙無逺謀甲第紛紛何足數飯蔬飲水真樂哉千古風流想尼父夜飲二絶笋芽鵝炙殊可口明月清風不着錢坐對青州一從事共君今夜不須眠欣然有意引陶潛此意何妨俗士嫌三百青錢亦希有速將趂取夜厭厭秦刷子誰研碧琅玕影撼半庭風月尚有嵗寒心在留得數根華髪龍孫愛戯碧波濤喜動清風發到得浪花深處一甌香雪西江月風動一軒花竹琅玕青錦薰籠憐才自是宋墻東誰識琴心挑弄暮雨乍收寒淺朝雲又起春濃氷肌玉骨信俱融不比巫山閒夢驀山溪元夕半生覊旅幾度經元夜長是競虛名把良宵等閒棄捨去年元夜道得身閒依舊是客長安寂寞孤眠者今年元夜也則非鄉社却有人約擕手燈前月下那知風雨此事又參差成怨恨獨恓惶清淚潸然灑七夕西江月詞我笑牛郎織女一年一度相逄歡情盡逐曉雲空愁損舞鸞歌鳯牛女而今笑我七年獨臥西風西風還解過江東為報佳期入夢翼按先生詩詞乃百十中之一二耳然初筮齋詠雪一首直與盧韓月蝕詩並驅詠桃花菊一首體物之妙雜之蘇黄集中人不能辨吉光片錦大庖一臠豈在多哉少陽集巻五
