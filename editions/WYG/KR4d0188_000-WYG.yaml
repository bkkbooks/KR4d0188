body:
  text: 少陽集目錄别集類三宋巻一上書上巻二上書中巻三上書下巻四書贊巻五詩詞巻六附錄臣等謹案少陽集五巻附錄一巻宋太學生陳東撰東字少陽鎮江丹陽人事蹟詳宋史本傳其集刻於元大徳中者曰盡忠錄凡八巻編次頗嫌錯雜刋於國朝康熙中者曰少陽文集凡十巻前五巻皆東遺文後五巻則本傳行狀及他書論贊今存遺文五巻附錄史傳一篇行狀一篇及欽宗省勅一篇髙宗諭㫖七篇為第六巻他皆汰之東以諸生憤切時事伏闕上書糾蔡京童貫諸人可謂直矣第於時國步方危而煽動十餘萬人震警庭陛至於壊院鼓臠中涓迹類亂民亦乖大體南宋末太學之横至於進退大臣莫可裁制其胚胎實兆於此後應詔再出卒以此為黄潛善所搆雖小人隂險工於擠排亦東等有以致之矣第以心在國家言皆剴切且能批摘權臣冒萬死以伸公憤故南宋以來儒者以忠義予之而遺文亦至今傳述焉乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9c56a5fdd18e0e0ff839d5ea11f33b552133564b6a9fd39bda57853234a1b6e7
