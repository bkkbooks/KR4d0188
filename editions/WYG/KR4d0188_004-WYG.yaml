body:
  text: 少陽集巻四宋陳東撰書答江西提舉監丞蔣宣卿書七月七日太學生丹陽陳東謹再拜奉提舉監丞朝議閣下即日秋暑伏惟撫部多暇尊候起居百福東伏䝉特遣急足逺賜書翰并示到照牒一道舉東應詔赴行在所仍給㑹子一紙計錢一百千助東路費并差兵士三人隨行東恐懼莫知所措東白屋一介之賤潦倒粗疎渉世迂闊生四十二年矣未嘗脩進謁之儀以干公卿大夫頃在太學為諸生時閣下佐官水衡東適有鄉人校館閣下夤緣邂逅獲一望丰采然恨未足少款以露心腑豈意悞聽以東姓名㸃汚薦墨乃取東往嵗獻書之故此尤非敢當者東不肖無狀暗於自揆逢時艱難輒有所論列狂妄之罪理合誅夷仰賴天子聖仁赦其萬死已是大幸豈敢更有他望哉向者少宰吳公嘗以區區亦請於上命之以官東於是循牆走避上章抗辭至於數四僅乃獲請朝廷蓋哀其誠而諒其無他也今豈敢復望以此受知於有位以僥倖進身耶閣下之意則厚矣閣下無乃過乎昔孟子所謂近臣遠臣觀其所主所為主則賢否可知矣東豈敢貪冒公舉以累閣下之賢乎不敢不敢所有照牒錢劵謹具别狀投連粘封授來价繳納伏望提舉監丞朝議閣下亦哀其誠而諒其無他而俯從之幸甚未有參見之期伏祝為國保重不宣答延康殿學士知鎮江府趙子崧書七月十一日太學生陳東謹再拜裁書於判府安撫延康閣下自閣下下車以來東村野跧伏未遑脩進謁之儀一展桑梓之敬懈怠之罪復何所逃方此恐懼忽䝉專价吏頒示公牒并賜之書東拜命感激愧無以當伏念東生四十二年矣自四五嵗先君教之讀書畧通大義不甚解也於時事一無所長惟愛君憂國之心憤世嫉邪之志出於天性不可强而奪年十七八先君子命事科舉游學校欲令以宦學起家自初至今二十五六年矣東謹守嚴訓蹉跎潦倒不悔也宣和七年冬孝慈淵聖皇帝登寶位時方强敵犯順朝廷艱危宗社之勢甚如累卵東在太學為諸生親覩國難不勝切齒刻骨盖其所以致禍之端深知備見抑鬱於胷中有日矣於是合在學生千百上章叩閽一吐之覬裨新政之萬一狂妄之罪至於再三理合誅夷賴國恩寛大赦其大死朝廷既又命之以官東惶恐失措循牆走避辭章屢上僅乃獲免旋即告歸桑梓之下負米奉祭養為世幸民已是過望尚復何求日夕北面祈嚮國威大振狂冦殄滅側耳捷音欲與黄童白叟酌酒相慶庶幾復見太平不意朝奸稔惡縱敵為患遂至大變使我兩宫䝉塵九廟危殆金枝玉葉墮落敵營奸逆乗勢僭竊大寶天下忠臣孝子疾首痛心東雖布衣白屋之賤不足道者然世世戴趙氏之天履趙氏之地含齒戴髮粗知忠孝豈忍坐視君父之危辱而安寢甘食乎號天呼地恨無死所幸新天子龍飛社稷復歸我宋天下之人獲再睹天日之光矣奈何二聖未有回鑾之耗一人不勝宵旰之憂茍有血氣之屬孰不願捐軀頂踵為國復恥如東之愚何足以為䇿引領朔風泣血而已豈謂仄席首及微賤閣下布宣德意敦諭諄複東雖欲懇辭固避以伸知難之義不可得矣當卜日趨赴闕下少効愚衷圖報萬一區區非毫楮可具旦夕俯伏堦墀諸容面陳不宣家書東百拜上覆婆婆姆姆十四叔嬸十八叔嬸三十叔嬸家中骨肉上下俱安東八月十四日到南京十五日入門十六日具狀申尚書省十七日詣登聞檢院上書十九日又上書二十五日又上書當日晚忽有應天府吏人來追取東必是得罪恐死生未可知然東已處之定矣切恐死後家中不知仔細老兒煩惱今特寫此紙恐要知東不以他故而死也新婦并二女東不暇顧卹盡教婆婆姆姆諸叔嬸照顧處置新婦見懷姙或得一男即先人之後不絶東死無恨矣六五弟善事六三哥同共奉侍二老兒勿教失所想諸叔嬸更不在叮嚀也二弟遍諸房尊長呼名起居見姑姑亦傳語四七妹今年便可與他成結了却死生天也切勿念東除隨身衣服外其餘行李盡付六十郎并諸僕㩦去且助二老兒使用大姐長成中間已許四六姐六五郎為親如他家不悔即與不然則别作處之請將此紙送與四六姐一看自餘不復言矣秋氣向冷伏祝善嘉保重不備建炎改元八月廿五日東百拜上覆婆婆姆姆諸叔嬸座前文字片紙已上盡令六十郎收管可一一檢之六二郎諸弟妹不及一一作簡㑹諸親一一導意東八月二十五日晚南京神霄書六十郎石青曾慶劉福趙慶吉能如將帶行李至家可一一多與錢羅貴遣去梓州襄城為二嫂去秦宅下書恐月初到東又覆自贊生本假借誰識其真丹青所冩非吾精神天地使我與物為春終當有歸髙閣麒麟少陽集巻四
