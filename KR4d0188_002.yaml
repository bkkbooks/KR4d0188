body:
  text: 少陽集卷二宋陳東撰書伏闕上欽宗皇帝書臣等聞任賢勿二去邪勿疑者社稷之主也奮不顧身死生以之者社稷之臣也妬賢嫉善妨功害能者社稷之賊也恭惟皇帝陛下聰明英睿獨智旁燭賢邪之分宸衷判然天下戴以為社稷之主也而在廷之臣奮勇不顧以身任天下之重者李綱是也所謂社稷之臣也其庸謬不才忌嫉賢能動為身謀不恤國計者李邦彥白時中張邦昌趙野王孝迪蔡懋李梲之徒是也所謂社稷之賊也陛下斷然不疑拔綱於九卿之中不一二日任為執政中外相慶知陛下能任賢矣斥時中而不用知陛下之能去邪矣然綱任而未專時中斥而未去復相邦彥復相邦昌自餘又皆擢用何陛下之任賢猶未能勿二去邪猶未能勿疑乎今又聞復罷李綱職事臣等驚疑莫知所以此必為邦彥等擠陷蓋綱起自庶官獨任大事邦彥等疾如仇讐恐其成功臣等聞綱比日用兵偶然小有不利邦彥等遂得乘間投隙歸罪於綱然一勝一負兵家常勢小勝固未足為喜而小挫亦豈足為辱況示怯示强奇謀祕計豈可遽以此傾動任事之臣臣等竊聞邦彥時中等盡勸陛下他幸兹豈誠為陛下計蓋時中邦彥等初見事有警急欲自保全各以差除親黨旋領外任遣家屬隨之逺去豈有身為大臣不能以一家死社稷之難其意止欲倉卒之際各自逃遁以保妻孥自諸大臣一鼓而倡之百官有司羣起而和之遂令京城之人閧然騷動弗安其居至聞羣臣勸陛下他幸則中外恟恟不敢自保當時若非綱為陛下建言則乘輿播越在外宗廟社稷已為丘墟生靈已遭魚肉陛下將有棄宗廟社稷之名何從復有天下賴陛下聰明不惑羣議斷自聖智特從綱請中外聞之雖愚夫愚婦莫不舉手加額仰歎聖德之盛綱之力豈曰小補之哉是宜邦彥等譖謗忌嫉無所不至臣等伏見邦彥等事太上皇帝享髙爵厚祿為日最久坐視天下之弊未嘗肯發一言以圖補報至如王黼童貫蔡攸共興北師天下皆知其不可上皇決之羣臣惟鄭居中力爭以為不可輕舉而王安中者力贊王黼以遂其役邦彥等輩非不與聞此議而略不可否於其間其實亦皆陰助王黼以貽今日之禍使上皇痛自罪抑避位而去陛下新即寶位遽有變亂之虞栗栗危懼不遑宵旰邦彥等並當引已歸咎自求貶放以謝君父而乃當此危急之際尚敢偃蹇自若持祿固位坐妨賢路又復忌嫉賢能害國大計蓋邦彥首倡講和之議又許割地挫辱國勢今欲必遂前非以逋罪咎幸綱小失因緣沮毁陛下若聽其言斥綱不用則宗社存亡特未可知若謂敵人真欲請和則既和之後尚敢攻我京城縱兵四掠屠我畿內裔夷之性急則搖尾緩則跳梁乍臣乍叛變詐百出竊知今日困弊不可枝梧聞陛下信任李綱自知滅亡無日請和之意必更激切而邦彥等乃得藉口以沮成謀遂致李綱罷廢罷命一傳士大夫失色兵民騷動至於流涕相弔咸謂不日為敵擒矣則是陛下罷廢李綱非特墮邦彥等計中又墮敵計中也聞朝廷又欲增與騾馬等物無乃假寇兵而資盜糧乎又聞邦彥等尚執前議必欲割地與之曽不知祖宗土地得之甚艱又況河北實朝廷之根本而三關四鎮實河北之根本若棄三關四鎮是棄河北則朝廷能復都大梁乎能都洛陽乎且如太原一郡凡經藝祖太宗兩朝親征僅乃得之祖宗所以必取者蓋以其地控扼北邊下瞰長安才數百里今棄太原則長安京城千里已在睥睨中朝廷又安能往都乎此祖宗所以特重兩河之地自真宗仁宗朝以來北敵蓋有割地之請矣朝廷寧屈己增幣以塞其欲至於土地一寸不肯與之聖聖相守咸念祖宗艱難之功惜國家要害之地不忍棄也今陛下即政之初邦彥等便欲棄祖宗疆土不知待陛下作何等主也不知割與太原中山河間以北十有餘郡之後邦彥等能使敵人復不敗盟否竊恐口血未乾已引兵南嚮矣自大梁至長安既不可都必將遷之金陵則自江以北非朝廷有況金陵正慮童貫蔡攸朱勔等往生變亂雖欲遷而都焉又不可得陛下將於何地而奠宗社耶又況保州乃祖宗陵寢所在一旦陷於北敵必遭暴露國祚長短所係非輕邦彥等忍棄之耶其意不過欲紓目前之急不為國家長久之訃又不過欲阻李綱成謀以快私憤亦恐李綱成功之後自知前議之失罪有所歸故併力沮之期於必勝想邦彥等日在陛下左右每一言及李綱用兵之事必故作驚怖之狀爭為危急之言以恐陛下欲陛下必聽其訃以害李綱自綱遭遇日見拔擢邦彥等自知必不能安身朝廷之上乃薦引私黨以塞陛下進用李綱之路而王孝迪者又是邦彥姻家必與羣奸力排李綱以助邦彥而在臺諫者亦多李邦彥等黨與前日邦彥請召國子監長二相見翌日乃聞祭酒謝克家除諫臣司業孫覿除御史臣等在學備見此事衆心不平豈有天子欲用耳目之官而宰相大臣前期召見以收私恩其意安在想今臺諫之中鮮為陛下發一言以明李綱之無辜者若綱可謂孤立無助臣等竊謂今日朝廷之上非特綱為孤立而邦彥等自為身謀不肯以腹心事陛下恐陛下亦成孤立矣可勝寒心天下共知李綱可以大用臣等請為陛下言其一二頃嵗京師大水自宰相大臣下及百官爭占舟船或結木筏為避水計是時邦彥等皆在朝廷曽不聞一人為君父備者亦不聞一人言及災異者獨綱慷慨為上言之至為奸臣譛逐數年不用前日邊報初至宰執骨月盡皆出京獨綱妻孥未嘗遷徙陛下方此深軫北顧之憂而左右大臣無一人為陛下請行者獨綱奮然以身任之綱之用心可見矣陛下何忍信朋邪之計而斥正人端士乎若以綱用兵小挫遂當廢罷則童貫創開邊隙以貽今日之禍近又引兵數十萬以興雲中之役幾於匹馬隻輪無還者朝廷曽不議貫之罪何李綱小挫而遽加罪乎若以敵請和議遂欲罪綱以謝敵無乃中其反間之術乎若曰邦彥等譖謗之故遽廢斥之無乃遭其愚弄乎一進一退在綱為甚輕在朝廷為甚重蓋今日宗社安危在此一舉幸陛下即反前命復綱舊職以安中外之心無終為異議所沮昔魏文侯令樂羊將而攻中山當時異議沮之至有謗書一篋及樂羊功成而歸文侯出其書示之樂羊乃再拜稽首曰此非臣之功君王任臣之力也唐憲宗討蔡數不利羣臣爭請罷兵憲宗曰一勝一負兵家常勢若師常利則古何憚用兵耶但論帥臣勇怯兵力强弱處置如何耳渠一敗便沮成計乎於是左右不能容其間而裴度請身督戰卒破蔡賊史臣有言非度破賊之難任度之為難也故韓愈頌憲宗之功曰凡此蔡功惟斷乃成憲宗號稱中興之主正在於此惜其弗自克厥終也臣等竊願陛下逺鑒前代已然之事坐照今日異議之臣奮發英斷復用李綱以成大功宗社幸甚臣等為陛下今日計莫若斥邦彥等拔綱而相之想吳敏耿南仲不肯與李綱共事更願速降詔㫖召徐處仁唐恪等置諸左右而閫外之事盡付种師道實專之內外將相之臣必肯悉心協力助陛下大有為於天下矣臣等學校書生素與綱無半面之雅與邦彥等亦昧平生所以必勸陛下進綱而退邦彥等豈有他哉蓋生靈之命與宗社存亡俱在陛下用綱與不用去邦彥與不去之間耳天下公論如此臣等豈敢默默陛下若以臣等之言為未足取信願試登御樓呼召耆老百姓一問之呼軍兵一問之呼行道商旅一問之試咨有官君子使言之必皆曰綱可用而邦彥等可斥也陛下用舍之際不可不謹臣等以布衣之賤論及宰相大臣罪當萬死干冒天威不勝俯伏待罪之至辭誥命上欽宗皇帝書臣於今月十三日准尚書省敕一道賜臣迪功郎同進士出身臣不敢叨冒恩命謹以具狀繳申尚書省乞敷奏追還成命者契勘臣於去年十二月二十七日同在學諸生伏闕下上書乞誅奸臣蔡京等六賊又於今年正月初六日三十日臣兩詣登聞檢院上書蓋因太上皇帝南幸申言六賊之奸又於二月初五日再同在學諸生伏闕下上書乞録用李綱并乞罷李邦彥等是日軍民不期而會不謀而同者十餘萬衆扣閽號呼驚動九重論臣之罪自當誅戮陛下仁聖赦其萬死在臣之分已是僥幸臣雖至愚粗知忠孝分義豈敢復萌一毫私心以希朝廷恩賞今來遽被寵命臣恐懼莫知所以伏念臣出自科舉肄業鄉校十有一年貢至辟雍升入太學又十五年矣臣未嘗不欲仕也惡不由其道有闕文之家或因父祖官至使相子孫遂補文資多方結託求賜出身及一時權幸叨冒官爵之人初未嘗知書而識字亦自有數自知名位穹崇不厭公論率多干求出身之賜如此之類溷濁縉紳躐等妄作衆心不平臣每遇此輩心甚蔑之竊謂一旦官曹澄清真可付之一笑臣正月三十日檢院上書已及其大略矣方欲再有申陳欲朝廷以惜名器清流品為先務而前日一切濫冒進者盡乞改正追奪然後已臣今豈敢躬自蹈之而於學校科舉之外妄受官耶況臣伏闕上書豈是得已之事事干宗社大計勢危情迫急欲上聞意謂天子深居九重之中堂下千里門庭萬里已是隔絶況登聞檢院等處去門庭又逺者則韋布芻蕘之言豈能遽達乎臣等諸生熟計議之咸謂叫號帝閽庶可即達此去年十二月二十七日今年二月初五日臣等兩伏於闕下也十二月二十七日所言奸臣蔡京等六賊者以天下壞亂至極乃致北敵侮慢中國上皇避位而去陛下新即寶位遽遭北敵之憂事至於此皆京等所致臣等諸生謂陛下即位之初當大明誅賞以示天下又況方欲鞭笞北敵必先立我國威以正內勢六賊不滅國威不振是必先誅京等然後賞罰明而國威立則在位之臣必能悉心叶力助陛下大有為於天下誰敢懷奸誤國如京等耶北敵聞之必望風逺遁矣此臣等伏闕之本心也二月五日所言乞斥李邦彥等而復留李綱蓋於初四日早聞李綱廢罷而軍民怨憤恟恟可畏臣等深恐不測之變瞬息竊發竊料朝廷之上侍從臺諫之中必無為陛下言者故乞亟復用李綱以安軍民之心此臣等伏闕之本心也臣等諸生遭遇聖明各欲盡忠竭孝以戴君父事干宗社大計奮不顧身為陛下言之豈敢於此僥幸官爵況十二月二十七日六賊者正在朝廷二月五日邦彥等六七輩亦方用事臣等以布衣一介觸忤權貴命如綴旒兼王時雍攜開封府劊子數人及兵士持器械者數十人至闕下意欲便誅臣等又王宗濋亦欲以殿前兵來殺之臣等知有宗社耳知有陛下耳曽何此之恤是日若非陛下親降詔㫖命大臣遣中使宣諭臣等則臣等皆即死于二人手矣臣若覬覦恩賞豈敢力抵秉政用事之人而致身於鈇鉞之間乎王時雍當時在闕下宣言謂臣等以布衣劫天子臣今受爵命則是當時合衆以要陛下果中時雍之言萬一朝廷或聽時雍之說臣等死有餘罪兼宗濋時雍各嘗出榜學門指伏闕上書為意欲作亂一曰當行軍法二曰當致極刑又時雍受李梲之囑欲根治諸生皆置於法蓋聞諭其鄉人之在學者使之逃避乃差下捉事人數百輩欲掩不備盡執諸生誅之若非陛下急賜止絶臣等諸生幾無噍類宗濋時雍又日遣人在太學察視諸生動靜至今不絶使一學之士惴惴然不得游息於其間二人各騁私忿如此安知陛下之待諸生正不爾也臣又嘗見尚書省榜示吳敏劄子申雪李邦彥之寃謂邦彥主和議用李鄴以成功乃引髙歡事陷臣等於叛逆之域臣等本欲以忠義報國而乃為敏時雍等歸以惡名臣等諸生日夜憂懼茍不能湔洗此名則萬世之後不免得罪於名教臣豈宜更因此以受官爵不知朝廷當時待臣等如此今乃遽欲加臣以官何舉措不審如是耶臣又聞近日大臣與李綱論事不合乃指臣等當時伏闕與綱結托臣等諸生傳聞此說不勝駭歎綱於臣等何有兼一日之間十餘萬衆豈人力所能遽集此固不敢以口舌辨也然臣獨怪今諸大臣往往皆陛下所倚信陛下興衰撥亂宵旰不遑之際正當愛惜寸陰若救焚拯溺然頃刻不宜少懈今乃上恬下嬉猶多暇日反汲汲薦臣以官臣之官與不官何預國之緩急臣願大臣緩其所緩急其所急同心同德勤勞國家助陛下大有為於天下以成中興之功臣謂今日之所急者退小人進君子修政事攘邊患今小人未盡退君子未盡進故政事未甚修而邊患未易攘也方今天下事無大小罔不蠱弊正須振頽綱起廢事刮磨整齊之然後可奈何猶坐視而不救乎臣知之矣其大患有二焉陛下不斷大臣懷私此方今之大患也陛下不斷則主威不立大臣懷私則公道不行主威不立則雖有大禹之憂勤文王之恭儉未能濟功也公道不行則雖有伊尹之志周公之功亦不足觀也已臣何以知陛下之不斷而大臣之懷私乎蔡京蔡攸尚逭典刑臣以是知之也蔡氏罪惡貫盈雖族滅不足以償天下之憤自崇寧以來蔡京專權跋扈壞亂天下窺伺神器動搖國本天下共忿之臺諫之官如陳瓘任伯雨何昌言江公望等論列京罪章數十上兼近日言者備疏蔡氏父子之惡衆論不容如此終未正厥典刑以誅殛之臣以是知陛下之不斷也臣亦知陛下非不欲誅殛之也所以未能斷然不疑者豈朝廷之上有為之營救者乎今諸大臣率多蔡氏之黨往往傅㑹牽合以蔽蔡氏之罪臣以是知大臣之懷私也大臣如此陛下當每有以察之勿以其有可録之功而遂忘其所可疑之言臣若見之當面折之曰陛下方欲大明誅賞彰善疸惡以成中興之功宰執大臣各當赤心以助陛下何苦懷一蔡氏害國大計耶不過以謂昔致身於此卵而翼之蔡氏之恩不可忘也抑嘗回首思之乎蔡氏所以恩我者朝廷之官爵耳今不負蔡氏即負朝廷二者必有一焉與其負朝廷寧若負蔡氏況於蔡氏何負之有傳曰大義滅親古者人臣之用心也茍事干天下國家雖父子不敢相隱故舜殛鯀而禹不敢置一言之救石碏亦不敢輒私其子厚也況朋黨乎臣等書生前此上書無慮千百輩其間豈無蔡氏鄉黨親戚故舊然公議所在不敢私也何宰執大臣乃欲懷私害公黨奸臣而忘君父乎陛下在東宫時固已備知其罪不待人之言也臣請謫其包藏禍心不可遽測者陳其一二臣謹按蔡京用事每有異志蓋嘗與蔡崇陰謀是時陳瓘之子來訴於朝蔡京怒之編置海島天下州郡城門之嚮帝都者素號朝天門京乃令更名曰朝京欲為天下朝已之䜟創興學法以貢士退歸者為退送意謂送者宋也欲為退宋之䜟甚者建四輔以分天子之兵置三衛以弱天子之勢托祝聖而植臨平之山假利兵民而決興化之水動皆不軌致姪俁之告變而繆為心疾受孟翃之訛言而與之以官趙直以妖術附之張大臣竊議其惡前後言者論之甚詳想章疏具存陛下試取觀之可知其奸也至於復道曲河相通宫禁脅持君父言者或未及之又改公主郡主縣主為帝姬宗姬族姬此其用意尤彰彰者蓋趙出嬴姓而姬姓蔡所自出京乃使天子之女悉從已姓悖逆不臣有如此者頃嵗張懷素與吳儲等謀反為范蓼所告開封府制勘懷素供備言京嘗有謀是時開封府尹林攄御史中丞余深實主其事二人乃京死黨力為掩覆凡文欵及京者必令焚毁京遂幸免其後攄深驟遷宰執皆京報之也京在相日動以數年不除一諫官意欲掩上皇從諫之聖以絶天下議己之言愚弄朝廷幾同兒戲天下皆知京有宗楚客之心使其得遂厥志必為王莽無疑幸宗社之福其志弗遂耳京兄弟被遇三朝崇寧間京為宰相卞為元樞弟兄專將相之權國朝以來所不許也京之凶焰可畏當時無敢言者京父祖子孫坐享髙爵厚祿幸冒恩寵二十餘年義當子子孫孫捐軀報國前日邊報警急適在陛下即位之初北顧驚撓不勝宗社之虞蔡京蔡攸乃與童貫朱勔等盡挈家屬强挾上皇南去使陛下父子離隔晨昏之念日軫聖懷蔡氏父祖子孫不下數十人無一二留者曽有一毫事陛下心乎京既以扈從上皇為名乃獨留拱州已無心於上皇矣臣灼見京留拱州甚不徒然意欲穩坐中間伺兩宫之安危然後自為之地也萬一陛下當時果從羣臣之議決意他幸都城不守京必起為賊用京固知北敵為冦必不能久有中原敵去之後必乘勢據有我宋二百年之社稷以償其素志與其子孫朋黨內外逺近更相應援陛下雖欲力圖收復恐未易也若或上皇渡江之後蔡攸等變亂遂成京必奔馳以就其黨江以南非朝廷有京之奸計每每著聞京前日在拱州日夕飲晏聲樂不絶比至謫往西都則帶花飲酒徜徉市城偃蹇自若是曽以君父朝廷為意乎陛下謂不誅之可乎蔡攸之罪尤不可容者攸之為人驕淫狠傲在家則無禮於其親在朝則無禮於其君不忠不孝天下響聞閨門淫穢復不可道招權怙勢侵亂朝政燕山之役後闕少陽集卷二
