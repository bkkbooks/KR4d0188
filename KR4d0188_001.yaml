body:
  text: 少陽集巻一宋陳東撰書登聞檢院上欽宗皇帝書臣等聞自古帝王之盛莫盛於堯舜堯舜之盛莫大於賞善罸惡堯之時有八元八凱而未暇用有四凶而未暇去堯非不知其可用可去也意謂我將倦於勤必以天下授舜特留以遺之使大明誅賞以示天下耳故傳曰舜有大功二十而為天子天下誦之至今不息臣竊謂在道君皇帝時非無賢才如八元八凱而未用者非無姦臣賊子如四凶而未去者道君亦非不知之特留以遺陛下又況方此北人侮慢中國正欲收天下之心求天下之策以禦北人之難以安中國之勢然惡者未去善者未得臣等竊為陛下先誅所謂姦臣賊子如四凶者則天下皆曉然知陛下好惡所在行見智者獻謀勇者竭力忠臣義士莫不捐軀効死為陛下用於是賢才如八元八凱者可舉而用矣北人何足患哉欲知奸臣賊子如四凶者曰蔡京曰王黼曰童貫曰梁師成曰李彦曰朱勔之徒是也臣等謹按蔡京罪惡最大崇寧初太上方恭黙聽斷起京閑散之地擢寘宰司京天資凶悖專權䟦扈首為亂階陷害忠良進用憸佞引置子孫盡居要途變亂祖宗法度快其私心竊弄朝廷爵賞固其黨與蠧竭國用殘暴生民交結宦官姑息堂吏盤根錯節牢不可解京乃偃蹇自肆無復忌憚包藏禍心實有異志縉紳側目莫敢誰何有識之士比之王莽所幸宗廟之靈社稷之福太上聰明睿智洞照其衷姦計敗露弗得竊發使京若輔少主其簒奪復何疑哉此非特臣等知之天下共知之臣等聞頃時陳瓘任伯雨何昌言江公望皆曽論其奸状故此數人者為京一斥不復再用至有飲恨而死者天下怨之縁京用事姦人並進王黼相繼為相位至公傅騁柔曼之容肆俳優之行欺君罔上蠧國害民無所不至假應奉君上之名置局私家四方珍貢盡入黼室自奉之餘始以進御賣官鬻爵貪饕無饜奸贓狼藉縉紳不齒觀其所為大抵效京朔方之釁黼實啓之是時童貫實同其謀貫本與京結為表裏因京偕助遂握兵權至為太師進封王爵左右指使官至承宣閽卒庖人防團是任自古宦官之盛未有其比然貫實庸謬初無智謀每一出師必數千萬隨軍金帛動億萬計比其還朝兵失大半金帛所餘盡歸私帑臣等葢嘗聞之邊人貫之用兵紀律不明賞罰不公身冐矢石未必獲賞為貫親隨厚賞先及夫以師之耳目常在大將旗鼔進退從之勝負繫焉貫身去敵常數百里是致將不先敵士不用命以見敗衂挫辱國威士卒陷亡不以實奏所獲首級増數上聞祖宗軍政壊亂掃地而又貪功冐賞不察事機朔方之兵遂致輕舉敗我國盟失我鄰好今日之事咎將誰執貫之所恃有梁師成實聨婚姻以相救援師成之惡抑何可言外示恭謹中存險詐假忠行佞藉賢濟奸盗我儒名髙自標榜妄立名號衆稱隠相欲攬國家之柄盡歸諸已欲使天下士大夫盡出其門端人正士往往望風疾走而避之亦有不幸而遭其㸃汚者一時茍賤無恥之人爭往從之旋致顯位王黼之進實賴師成師成與黼如貫與京内外相應捷若影響黼為相臣專秉國政奉行師成之意而已不聞天子之命也朝廷執政侍從天下監司郡守往往皆師成門生蔡京父子奉之不暇至如去嵗太上一日相二人師成自謂皆出己意聞者駭恨不已夫論相者天子之職也宦官擅權乃敢僣擬浸淫不已事必有大於此者焉可勝寒心頃嵗李彦以根括民田按行河北京東京西威赫三路所在州郡據堂廟坐使監司郡守列侍其傍而列侍之軰咸藉彦進不敢輒違臣等聞中間曽有人詣太上論列此事時師成適在上側抗聲言曰王人在古諸侯之上使其人不得盡言遂致李彦凶燄益熾奪民常産重歛租課當職官吏稍有違忤即諷監司捃摭他故無辜送獄士大夫憤鬱而死者往往有之三路百姓破家流蕩不知其幾人愁歎怨苦之聲洋溢道路去年京東河北止以租錢及燕山免夫之征剥尅太甚盗賊四起正如兩淛曩時清溪之寇實由朱勔父子漁奪東南之民結怨數路方臘一呼四境響應屠割州縣數十殺戮吏民動傷萬訃天下騷然彌嵗不已皆朱勔父子所致生民何辜按勔父子皆曽犯徒杖脊始因賄事蔡京夤縁入仕交結閹寺遂致超顯招權怙勢氣燄可炙出入禁闥無時而衞士莫敢呵止侵移内帑無數而有司不得會計其所請錢號為收買花石進奉之物其實盡以入已自初至今不知其幾千萬數父子每以勾當公事為名多挾官舟往來淮浙興販百端騷動數路蔑視官吏僅同奴僕所貢物色盡取於民四散遣人盡行搜括士庶之家一花一石墳墓之上一松一栢輒用黄紙緘題以充進貢撤民屋廬削民塜塋幽明受禍所在皆然甚者深山大澤窮崖斷谷江湖危險人迹不可到之地茍有一花一石實生其間必作威福逼脅州縣期於必取間有不可力致而官吏申白者輒大怒詈以不奉上之名歸之官吏畏懼此名不免驅動百姓極力攻鑿得而後已由是致人顛踣陷溺以隕其身者不知其數東南之民怨入骨髓欲食其肉而勔父子方且炎炎未艾天下扼腕此六賊者前後相繼誤我上皇離我民心天下困弊盗賊滋起兵革不休遂至北敵交侵危我社稷太上哀痛情實切至前日詔書一出觀者如堵婦人孺子亦嘗流涕臣竊謂太上罪己詔播告四方而京等未正典刑天下疑惑葢京等平日收恩於己歛怨於上前此罪狀未白天下不無歸怨於太上者若不誅京等六賊將何以慰太上之心雪太上之謗以解天下之疑而況今日之事王黼實專其謀童貫實專其任敗祖宗之盟失中國之信創開邊隙實費枝梧是致陛下新即寶位遽勞北顧之憂臣子之心不勝憤憤究其所由蔡京壊亂於外梁師成陰賊於内李彦結怨於西北朱勔結怨於東南王黼童貫又從而結怨於金敵遂使天下之勢危如絲髪臣等竊謂此六賊者異名而同罪伏願陛下乾剛夬決斷自聖志擒此六賊肆諸市朝與衆共棄傳首四方以謝天下庶幾太上之志果成於陛下豈不偉哉陛下方欲鞭笞北敵必先立我國威以正内勢六賊不滅國威未振兼此六賊黨與之盛徧滿中外又養死士數百人自為之備若陛下萬一少從寛貸止於竄逐禍胎尚存則肘腋之變恐生不測方之北敵殆有甚焉史有之曰去河北羣賊易去朝廷朋黨難陛下誠不可不留神也而況蔡京王黼童貫葢嘗陰懐異意摇撼國本頃年楊戩亦有是心所賴陛下父慈子孝兄友弟恭此數賊者計弗得行天下臣子切齒刻骨有年於兹常恨未得上方斬馬劍斷其腰領以告宗廟陛下其忍不誅乎楊戩雖死願陛下亦勿赦此賊發其冡暴其骨以解天下之怨憤梁師成乃王黼之應也黼之開邊師成實有助焉朱勔以奇技淫巧進而官至建節鄭居中力爭不可至鬱憤而死葢當時用勔建議北伐遂有此除今朔方如此勔當如何乃有稍聞警急朝廷不暇安枕之際勔父子遽先衆人欲盡室東下計其情實尤不可赦李彦據有西城所錢物去嵗東京盗起米斗千錢兵民缺食中外憂之彦乃發錢數千萬往淮浙買米運至東京以規厚利前日太上詔罷西城所錢令以其錢付之有司聞彦尚欲强占不肯交割及至交割所存無幾宦官抗國悖慢如此尚復可容臣等願陛下斷然無疑必殺無赦使天下忠臣義士得信於今日傳云去惡如農夫之務去草芟夷藴崇之絶其根本勿使能植則善者信矣今北敵侵凌正為此六賊者起陛下豈忍惜此六賊以危天下乎使唐明皇早誅楊國忠則禄山未必有以藉口幸陛下無小不忍於此也陛下赦而不誅即恐天下共起而誅之矣夫舜之去四凶亦見於受禪之初未聞其猶豫也可不鑒哉臣等竊聞道路之言曰蔡京自謂有建立儲貳之功此語尤為悖逆太上初立陛下為太子天下共知斷自宸衷立嫡立長古今大義何與京事而乃欲貪天之功以為己力耶此大不然者願陛下亟圖之然後赫斯怒而北顧決策親征以威北敵彼雖跳梁不遜豈無一念契丹昔日澶淵之禍乎臣等竊謂親征之詔一出敵人心寒膽落矣議者或謂兵食不足未可輕動臣等竊謂不然陛下即位天下歸心今更誅此六賊以快其憤孰不効死為陛下用臣等雖布衣一介之賤亦豈不能捐軀報陛下耶況聞比日朝廷募兵日得數萬人皆一時忠勇精銳之士兵不患不足矣諸司不急之務悉已罷去而其財用盡歸朝廷富家巨室各有進獻更若籍沒六賊及他宦官幸臣素冐錫予積聚貨財不知紀極者又何患財用之不足乎臣等不自揆度輒以宗廟社稷安危大計獻於陛下干冐宸嚴罪當萬死臣不勝俯伏待罪之至登聞檢院再上欽宗皇帝書臣伏讀今月一日詔書自中外臣寮以至民庶嘗許實封直言得失臣幸遭不諱之朝遇從諫如流之君正臣子知無不言之時也臣竊知太上皇已出幸亳社而蔡京父子朱勔父子及童貫等軰統兵二萬從行臣深慮此數賊遂引太上迤邐南渡萬一果爾實可寒心葢東南之地沃壤數千里郡縣千百中都百需悉取給焉然其風聲氣俗素尚侈靡天下貴驕之人往往動心京勔父子及貫等黨與布滿諸路自從數賊用事二十年間賢士大夫耻於遊宦東南而其監司郡守州縣之官率皆數賊門生若勔父子尤專江淮二浙之勢良民受害怨之刻骨而一時奸雄豪强及市井惡少無不附之京父子平日善收私恩近除發運使宋㬇是京子攸妻黨京即委㬇占奪官舟載其家屬貫前出討方寇市恩亦衆兼聞私養死士自為之備臣前日上書言六賊罪惡已嘗及此數賊罪大難掩公議弗容自知不免反怨朝廷夤縁太上遂請此行臣竊恐此數賊南渡之後必假太上之威乗勢竊發振臂一呼羣惡響應離間陛下父子事必有至難言者則東南之地恐非朝廷有又聞京勔父子欲歸於淛中恐嵗月之久東南又有數郭藥師矣其為患豈北敵比哉此實宗廟社稷莫大之計不敢黙黙伏望陛下速降睿㫖急追此數賊復還闕下早正典刑仍乞檢會臣前書一併行遣却別差忠信可委之人扈從太上前往亳社庶全陛下父子之恩以安宗廟又況天下之事禍福之機藏於細微辨之不早噬臍之悔何及臣願陛下無小不忍也臣不自揆度以區區布衣之賤敢言及此罪不容誅臣俯伏以俟斧鉞登聞檢院三上欽宗皇帝書臣於去年十二月二十七日曾同本學諸生等伏闕下上書言蔡京王黼童貫梁師成李彦朱勔等六賊罪惡乞行誅戮又於今月初六日獨詣登聞檢院上書言京勔父子及貫等挾太上皇帝南去恐迤邐渡江假藉威勢遂生變亂乞追數賊復還闕下各正典刑别選忠信可委之人往侍上皇前後二書至今未蒙盡賜行遣雖聞王黼李彦已曾施行然辠大謫輕未厭公論京勔父子釋而不問縱之南去師成尚在親宻之地中外疑惑臣竊謂朝廷方因北敵之難未暇議此以故未敢再有申陳然今日事勢之急殆有甚於北敵者況北敵之兵皆由羣賊誤上皇所致今又挾上皇於危急之地臣豈敢尚爾黙黙臣昨日聞諸道路之言曰髙俅近收其兄伸等書報言上皇初至南京不欲前邁復為數賊挾之而前㳂路刼持則無所不至上皇飲食起居不得自如數賊阻隔甚嚴除其黨與之外不容他人輒得進見雖髙俅被宣欲進亦復艱難上行至泗洲乂詐傳上皇御筆劄付髙俅令只在本州守禦浮橋不得南來遂挾上皇渡橋而南以赴江浙其隨駕衞士盡為羣賊斥之而回聞方過橋之時衞士攀望上皇車駕失聲號慟童貫遂令勝捷親兵挽弓射之衞士中矢而踣自橋墜淮者凡百餘人髙俅父子兄弟在道傍僅得一望見上皇君臣相顧泣下意若有所欲言者而群賊在側上皇氣塞聲咽不敢輒發一語道路之人莫不扼腕流涕臣雖至愚粗知忠孝傳聞此事不覺涕淚流臆為陛下憤陛下父慈子孝天人之所共知上皇今為天子之父而乃受制奸臣賊子一至於此可勝寒心此臣所以汲汲為陛下言之也葢數賊之黨徧滿東南而上皇隨行之臣如宇文粹中又是蔡京甥壻其弟虚中聞亦竄而往蔡攸京之子也得守鎮江據千里山川要害之地宋㬇蔡攸之妻黨也出領大漕專數路金榖歛散之權童貫有親隨勝捷之精兵朱勔有一鄉附己之衆惡皆平時陰結以為備者一旦南渡即恐振臂乗勢竊發控持大江之險奄有沃壤之饒東南千百郡縣必非朝廷有是將傾陷陛下父子使之離間非特聖孝之養阻奉晨昏而其事必有至難言者臣竊謂今日之勢北敵非所患所可深患而圖之不可少緩者正為此爾陛下何尚不忍於此也臣知之矣必是梁師成陰有營救致陛下未得奮發英斷臣請申言師成之惡臣毎得之縉紳之言曰師成為人真是憸佞自其容貌觀之似不能言者而稽察其衷陰險禍毒最為可畏盗我儒名外示亷静其實招權怙勢侵我綱紀上皇每進用一宰相大臣以及侍從之官師成必收其功以歸諸己故宰相大臣秉持國政必惟師成之命是從王黼事之不啻父兄蔡京父子趨事不暇師成氣燄傾聳朝路賢士大夫莫敢側目至如文章之事責在詞臣朝廷典誥各自有體師成必欲其文悉如己格或一背違輒行譖斥國家取士至公之選無如科舉士大夫所恃以自異者無如及第出身人主所籠絡天下英俊以求將相者正在於此而師成乃薦其門吏使臣儲宏兩次特赴廷試賜第唱名宏自登第之後依前使充使臣之役則是天子臨軒策士止可充師成趨走執役之吏爾非特以左右奴僕玷辱士類又所以輕侮朝廷選舉之法宣和六年春上皇親策進士八百餘人皆以獻頌上書為名特赴廷試率多師成之力盡是富商豪子先曽進納及非法補受官職士大夫不齒之人或白身不足以應進士舉者聞每名獻師成錢七八千緡師成便與奏請特赴廷試之命師成所薦既衆即又轉令張補等將上其他權幸遂相效以貰利師成實啓之每遇賜第唱名之日師成必在上側臨時奏請妄有升降以害公道在廷之士往往解體國家選舉之法為師成壊亂幾至掃地此事縉紳士大夫上至朝廷之所共知第畏師成不敢言爾師成平日受四方監司郡守以下餽遺不計其數又創置北司以聚不急之務專領書藝局擅建官吏賸立工徒以進市井游手無賴之軰濫恩横賜糜費百端京師土木之工窮奢極侈往往師成實董其事因而盗偷官錢不知紀極倘不察其所為而惑其足恭詐偽必以為真能亷静者此所謂以直濟佞以亷濟貪大佞似聖大詐似忠者也臣又聞師成在内朝善觀上意所向隨向隨轉毎以其性取之夤縁為奸竊弄威福陰奪人主之柄正如美酒好色浸淫害人而人常耽嗜無厭不覺遭其害也臣恐師成今在陛下左右浸潤彌縫無所不至陛下離明獨照洞察其奸必不為其所惑然師成與貫結為姻家京黼勔彦又其積年之朋黨盤根錯節牢不可解師成不去同惡尚存深念陛下威福之柄未免竊弄於此人之手羣賊等軰倚為奥援陛下雖欲大明誅賞以示天下以慰太上之心胡可得為哉數賊罪惡貫盈陛下素所備知不待臣區區之說臣前書所陳已可概見臣更請以比日所聞為陛下言之前此上皇傳位陛下葢其聖志素定非臨時倉猝之謀惟此數賊實嘗撓之而蔡攸者阻遏尤力賴上皇聖明獨斷志莫之奪贊襄之力呉敏有焉陛下謙遜之際聞數賊宻請鄆王皆來至殿上而師成實為謀始比至事定自知失計乃爭言曰太上之志我實成之呉敏之策我實授之定策之功我實有之人臣要君莫此為甚天下共知數賊之心久欲不利於陛下方陛下在東宫之時各懐異意欲伺間隙於是楊戩亦同其謀臣前書已畧言之矣又見比年都城婦女首飾衣服之上多以韻字為飾甚至男女衣着幣帛往往織成此字皆是師成倡為䜟語以撼國本羣賊和之更相誇尚以動天下之心忠臣義士切齒刻骨非一日也迨今傳位之次復肆奸謀其謀弗成乃欲貪天之功以為己力始終陰慝有如此者又況蔡京久事上皇素有異心童貫蔡攸近與金人結為内應欲分我中國而王之反状敗露遂即逃遁朱勔父子勢傾江淛已二十年矣今此數賊同挾上皇而去亦恐素志勿悛未必肯利於上皇也萬一禍有不測而梁師成復從中起陛下將何以處之願亟圖之無使滋蔓難圖也臣竊以今日北敵恣行侵侮而我上皇哀痛辠已至避位而去凡厥左右大臣及親近用事之人不問有罪無罪率當引已歸咎自求貶放為君分謗也豈有其君痛自罪已而一時巨臣偃然自若畧不知悔則前日之事咎將誰執矧今北敵之釁實自數賊啓之不知陛下何憚不誅而縱其逺遁使之幸免耶或尚使出入禁闥而無所忌憚耶江浙之變蕭墻之禍不可不慮陛下若欲正厥典刑當自梁師成始不然則朝廷之上動輒掣肘事未可圖也臣願陛下勿以臣布衣之言為無足採者愚者千慮必有一得陛下姑試行之仍願陛下速降徳音往上皇行在告諭應隨行軍兵錫以厚賞各使悉心協力衞䕶上皇車駕亦乞亟命宰臣恭賫陛下親筆奏請往迎上皇早還京師庶使不負終身欣然樂而忘天下之志陛下復全父慈子孝之美以彰孝治之盛天下幸甚臣為此書而或見譙曰上方以北敵為患子獨不能獻一謀策以為上計而乃汲汲於前日之事毋乃不知前後緩急乎臣應之曰此大不然者北敵之患止於手足羣賊之患實在腹心腹心疾去元首自全手足浮疴豈能為害今北敵所欲大則土疆小則玉帛玉帛相通自古有之祖宗土疆得之甚艱寧忍棄之一日縱敵數世之患寧不鍳之城下之盟不足守也豈不知之千里襲人未有不亡者也今敵襲我越數千里其亡必矣尚何疑之有師克在和不在衆同心同德和之至也廟堂之上帷幄之中將相大臣孰能從之陛下淵黙雷聲乃赫斯怒奮發英武以殄北敵又何難焉此在睿謨必有以處之矣如臣書生豈敢妄議臣書所陳必欲先誅六賊者事係陛下父子天性之重宗社生靈莫大之計臣謂今日之事惟斷乃成當斷不斷反受其亂幸陛下留神洊瀆天威罪當萬死臣不勝戰慄恐懼之至翼按宣和間謂婦人有標致者為韻至施之衣者曰韻纈果實曰韻梅調曲曰韻令乃梁師成為鄆邸倡為此䜟也少陽集巻一
