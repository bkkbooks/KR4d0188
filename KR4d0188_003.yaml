body:
  text: 少陽集卷三宋陳東撰書上髙宗皇帝第一書臣聞中興之主必有中興佐命之臣龍虎變化風雲感會然後能旋乾轉坤經緯天地再造王室以成中興之大業與創業無異而尤難焉然所謂中興之主者非中材守成之君也是必聰明睿智英特果斷足以用天下而天下之所歸向者也陛下是也所謂中興之臣非退縮謹畏之人也是必忠義慷慨剛明果敢足以任天下而天下願以為輔相者也李綱是也伏自二聖北狩僞楚僣竊天下皇皇不知所措雖愚夫愚婦朝夕祈嚮陛下立而李綱用未幾果聞陛下即位首召李綱而相之天下之人悉舉手加額以慶聖君賢相之出有志之士莫不願捐糜頂踵以赴功名之會如臣之不才尚亦奔走赴命之不暇臣七月十五日於本貫鎮江府丹陽縣祗受五月十日聖㫖令臣發來赴闕續准尚書省劄子令即速發赴行在臣於七月二十日起發八月十五日到行在入門訖仰惟陛下即位才十日輒下明詔呼一布衣韋帶之士其意豈茍然哉臣竊意陛下必欲聞天下之言臣謹齊戒裁書以述天下之言欲擇日投進仰報陛下知遇之萬一而其書未及繕寫之間於十六日晚忽聞宰相李綱乞出尋聞陛下差人押出而綱即復出省人情洶洶相顧失色咸謂李綱一出即陛下孤立天下事去矣竊惟陛下大用李綱出自獨斷必知天下之人願綱為輔相以佐命中興是陛下為天下用綱也綱所以奮然起為陛下用亦必知天下咸戴陛下為中興主也君臣相遇如此真所謂千載一時宜乎聖賢相投人不得而間言陛下必推赤心於綱腹中信任之而不疑綱必披露肝膽以報陛下而不肯曲從茍合為容恱計也元首明服肱良運天下於一堂之上而中興之業可指日以就矣今綱遽然求退臣不知所謂竊聞道路之言曰綱所坐止以薦舉張所傅亮往河北措置邊事而所亮逗留不進朝廷大臣有力請陛下罷此二人者而綱力爭此二人不可罷頗貽陛下之怒以故求去甚力臣竊謂君臣之間正當可否相濟期於事成都俞吁咈是乃為和今乃便為進退何至是耶伏自陛下即位李綱為相亦既有日矣曽不聞有大設施乃始知方事形迹之嫌如此天下失望豈非有先入之言離間陛下之君臣乎天下共知黃潜善汪伯彥二人者自謂於艱難之際嘗有恩於陛下皆以宰相自待甚不樂陛下之相李綱亦共知陛下艱難中得二人之力故用為大臣以報之若以潜善伯彥真可任天下之重陛下今既相潜善矣如或復相伯彥皆以為天下賀陛下自謂二人者與綱孰賢孰可以任天下之重而二人者自料果如何陛下必不肯欺天下而二人者亦必不敢自欺臣竊以謂方太平無事治不忘亂安不忘危人主亦不可以私意用人大臣亦不當偷合備位況在今日正當持危扶顛興衰撥亂必欲再造王室以成中興之大業君臣之際豈當事形跡之嫌容易進退而大臣亦豈當私意偷合於其間哉陛下若必許綱去必是不以天下之心為心也綱若必去是不忠於陛下而負天下之望也黃潛善汪伯彥之徒若必欲擠排李綱以為自進之計是不以君父宗社為念而不畏天下公議者也若謂李綱用人時有過舉此亦天下之所共知者臣方欲為陛下言之然綱大抵足以繫天下之心使綱不去朝廷豈復有前日之變訪聞金人尼堪嘗有言曰种師道已死李綱已逐可必取也綱在今日豈可一日而去朝廷乎考綱舉用張所傅亮最合天下公論聞張所勇於有為敢任難事傅亮知兵有智略而紀律嚴明二人者不可失若其逗留督過之可也如遽欲罷斥是其事復中廢矣前日之禍正坐朝廷主議不定用人不專狐疑猶豫遂致大變今豈可更蹈覆轍況閫外之事將軍主之將帥之任尤當專一自古帝王任將不聞從中御也況宰相大臣豈可懷私以害國乎願陛下坐照其衷謹勿許綱必解機職願且督張所傅亮前進仍多方應副責其成功黃潛善汪伯彥者陛下若知其可以大用即用之以成中興之大業若謂艱難之中嘗得其力而二人者是於陛下有私恩耳臣竊意當時不過勸陛下不進兵為自全之計正陛下之罪人也非有恩者也縱曰有恩陛下但當以髙爵厚祿處之於閒逸之地全保富貴而已豈可以宰相大臣之職報私恩乎天下之論咸謂綱一旦罷相陛下必以黃潛善為左相汪伯彥為右相矣而二人者又不過勸陛下幸金陵而已必無長策也陛下若一旦南渡則中原之地明日便屬他人矣所裁書以詳當今之急務天下之大事而金陵之利害亦在焉容臣繕寫續即進呈方今天下之事可言者甚衆李綱為相而論者亦不一陛下如留綱在相位臣當一一為陛下論綱之得失綱既去臣復何言臣與綱與潛善伯彥及所亮皆昧平生曾無半面臣所言非臣之言也天下之言也臣但聞天下之言謂綱可任為相謂所亮可任為將謂伯彥潛善若在朝廷必害中興之業謂潛善在前朝事王黼梁師成致身顯要號稱健吏若非陛下聰明必為此人所惑今後何面目立朝稱大臣乎夫人主之職進退大臣而已願陛下謹重宗社幸甚天下幸甚臣以草茅一介之賤荷陛下記録姓名首賜追召臣不敢不以天下之言報陛下想大臣必有怒臣之言者然但知不敢欺君父耳死生以之干冒天威不勝戰汗上髙宗皇帝第二書臣於七月十日准知鎮江府延康殿學士趙子嵩牒備准尚書禮部符及開封牒五月十日三省同奉聖㫖陳東令乘遞馬發來赴闕即時祗受前件指揮尋即治行七月二十日臣自本家起發二十六日渡江赴行在今月十五日入門訖伏念臣去年夏五月自太學請假歸省祖母吳氏退伏閭里未幾乃聞金人再寇京城臣雖至愚粗知忠孝身在畎畝之中而此心未嘗一日忘君父自冬徂春杳聞朝廷音耗引領北望日夕以俟國威大振敵人殄滅夏四月乃知京城失守時事大變兩宫䝉塵九廟危辱金枝玉葉墮落敵營逆孽藉勢僣竊大寶羣邪輔之更姓易號臣始聞之不以為信竊謂開闢以來寧有是事惟五代石晉以契丹得天下衰弱不競大勢未嘗入手故不旋踵為契丹所滅我祖宗誕受天命聖聖相繼積纍憂勤深仁厚澤格於上下天下人心未厭宋德況今諸將之兵大會畿甸毋慮百萬自當左右前後以衛王室豈容禍變一至於此誠不敢以為信也比見陛下大元帥府檄書傳示四方始信果然臣與家人婦子朋友故舊鄉黨親戚田夫野叟相向而泣曰吾屬世世戴趙氏之天履趙氏之地今忍復事異姓為僞民乎號天叫地恨無死所忽睹五月赦書知陛下龍飛社稷復歸我宋始與人人收淚相顧曰幸矣有生意矣再睹天日之光矣庶幾其復見太平矣方欲求田問舍躬耕以奉祭養以全其生以盡其年如是而已矣豈意陛下仄席幽隱首及微賤顧臣何人可以當此臣雖不肖無狀敢不奮勵感激竭忠盡愚圖報萬一恭惟陛下即位才十日輒下明詔搜一布衣韋帶之士其意豈茍然哉竊謂陛下必欲聞芻蕘之言矣有君如此頂踵何愛臣敢請以當今之急務天下之大事為陛下言之在陛下處之何如耳處之甚易亦甚難陛下聰明果斷則處之易於反掌若優柔不忍則無可為者矣臣謹具書一一奏聞惟陛下裁擇焉臣竊謂天下之事何事最大二聖北狩鑾輿未還天下之人雖賤如田夫愚如野婦每有一言說及二聖必相痛哭涕淚交流又況陛下孝弟之至神聖所鍾想見思念父母兄弟沙漠之苦寢食俱廢臣竊以謂徒能憂思於事無益陛下必欲二聖鑾輿早還莫若慨然奮發英斷選將治兵示强以取若欲卑辭加之厚幣或遣使命懇切邀請却恐示怯示我之怯益彼之强二聖鑾輿永無回日昔漢髙祖曾被項羽擒質太公羽謂髙祖若不急下吾烹汝公當是之時使漢髙祖畏怯恐懼哀鳴請命羽烹太公其理必矣髙祖聰明便以智勝乃為大言以壓項羽其言謂曰今我公者即是汝公如欲烹分一杯羮髙祖豈欲人殺其父事勢迫切乃為此言羽果不敢烹太公其後太公遂得生還臣願陛下今於金人亦當慷慨以氣壓之壓之之術乃在陛下決策親征銼折敵氣使知陛下果是不怯臣妄意親征之詔一旦而下天下之人莫不鼓舞願為陛下效死一戰紓其痛憤兵威士氣必然大振敵人雖强豈不逺慮必奉二聖歸而請盟臣願陛下刻意圖此臣竊謂當今之事何事最急用兵親征最為急務伏惟陛下父母妻子諸父兄弟六親九族盡在沙漠陛下以一身孑然獨立於億兆之上宵衣旰食北顧憂思必欲報復蒙塵之耻迎奉二聖鑾輿早還以成我宋中興大業用兵親征誠不可緩何以言之北敵之性意得志滿氣亦驕惰彼必謂我已是衰弱不復可振今能掩其不備乘其驕惰賈勇而前一擊必勝若失其時噬臍何及臣願陛下勿憚用兵議者多謂今日之兵無可用者臣謂不然天下之兵無不可用只緣前此將帥非人懷奸賣國銼折軍威欲戰之兵乃不得戰鬱憤喪氣至於解體如欲用之在陛下能舒其憤興作其氣憤或未舒氣或未作猛夫悍卒皆不能戰憤既已舒氣既已作懦夫孺子皆可為兵欲舒其憤興作其氣正在陛下大明誅賞去年今春三軍在行皆願捐軀效死一戰奈何諸將率為奸謀不肯輒出一人一騎為國禦敵乃下令曰殺敵者死偏禆小將有能率衆殺敵人立功者往往主將徑行誅戮緣此之故三軍沮挫竟無鬬志天下所以鬱憤喪氣伏自陛下即位以來天下之人傾心拭目日俟朝廷正厥典刑至今多時未賜行遣天下疑惑皆謂陛下欲姑息諸將失天下心臣謂陛下必不欲姑息此數人者失天下之心所以未正典刑罪在大臣不建明耳大臣所以未肯建明者豈以陛下為大元帥時兵未嘗進有此嫌忌不敢發端是以一切主兵之臣得以藉口劫持陛下自逭其罪臣竊怪之朝廷大臣何其無識耶豈不聞陛下向者為親王時狂敵犯順恃强要質勢不可遏淵聖皇帝篤愛手足不忍啓齒惟時陛下奮然請行略無難色聞嘗奏之淵聖皇帝曰為國家雖死何害願勿以臣在軍中遂不用兵害國大計其諭朝廷亦為此說天下聞之賈勇增氣咸壯其言仰歎聖質英特如此淵聖皇帝亦知陛下英斷果敢可任大事斷然不疑乃命陛下為大元帥當時陛下致身於國及為元帥豈肯畏避天下之人共知陛下數欲進兵耿南仲者竄走帥府剛執和議以沮陛下進兵之意又聞曹輔移文沮兵帥府官屬類多沮遏陛下失在聽信過當為數人者惑亂聰明遂致聖意進兵不決不為無過朝廷大臣乃欲陛下諱過自籠臣所不識自昔聖人未免有過不聞諱也孔子有言丘也幸茍有過人必知之君子之過如日月之食人皆見之及其更也人皆仰之為大臣者豈可輒使陛下諱過害國大計臣願陛下特降詔㫖自明其過示以不欺下不欺人上不欺天禹湯罪已不過如此遂使天下知不進兵不在陛下乃在南仲諸人之徒陛下便當大正典刑而誅殛之足見陛下不以私情而害國法遂使一切主兵之人不得夤緣幸免罪戾為安撫使如范訥為經制使如翁彥國者四道總管趙野等輩及諸被命主命勤王之人並皆坐視君父屈辱逗留不進朝廷大臣必備知之臣願大臣赤心至公以助陛下大正典刑其有進兵死事以及一切立功之人願加厚賞庶使刑賞既公且明天下之人莫不皆知自是之後有功必賞有罪必罰前日之兵不得戰者繼今以往竭力立功前日用命不得賞者今當必得次第受賞天下之憤何為不舒天下之氣何為不作更願陛下哀痛之詔日夕繼下天下之人當知陛下坐薪嘗膽頃刻不忘戴天之仇必欲一戰以復其耻莫不捐軀效死以助陛下將見天下富者出財勇者出力智者獻謀懦夫孺子皆可為兵更願陛下選將治兵奮然親征驕惰之敵一舉可滅恭惟陛下聰明英睿著聞夷夏天下共戴陛下為中興主陛下若以身狥父兄天下當以身狥陛下二聖鑾輿指日可回中興大業指日可就臣願陛下勉之而已切勿輒為怯懦之輩茍且其說惑亂聰明宗社幸甚天下幸甚臣在外方聞之道路其言皆謂朝廷大臣力請陛下遷都金陵有識之士莫不憂駭謂中國者必據中原然後乃能經制萬國號令天下自古以來帝王興起無捨中原能立國者金陵之邦本荆楚地後世偏霸勢不得已或遂都焉西晉板蕩河洛淪沒琅琊王者宗室疏屬用王導計移鎮江表愍帝既崩因而就立是為元帝初非特地遷宅於此自時厥後中原之地乃為盜有劉石慕容攘奪僣僞宋齊梁陳終不得復晉之東初席未暇暖遽有王敦起而為亂元帝乃欲歸避琅琊明帝英武克清大憝未幾蘇峻復起歷歸成康哀穆寖以衰削宗廟血食雖已百年子孫享國類皆不久劉裕二蕭以及陳氏其創立也亦必艱矣子孫不能長保宗廟社稷豈數君者一無長策貽厥後人蓋以金陵地薄勢孤山川迫蹙不拔之基此非其所矧今二聖北狩未回宗廟在京陵寢在洛陛下若聽左右之言遷都江左即是陛下逺棄父兄逺棄宗廟逺棄陵寢為自安計臣竊妄意勸陛下者必皆東南之人意在自便墳墓之奉俯仰之養不為國家長久之策陷陛下於不孝不弟臣嘗聞之在真宗時契丹入寇直至澶淵勢已迫近當時大臣有勸幸蜀亦有勸幸江南者皆是懷土自便之計宰相寇凖獨請親征真宗皇帝深燭厥理遂從其請車駕既至登城撫軍軍威大振射殺契丹主帥達蘭遂大破之自是契丹百五十年不敢南向蓋得真皇親征之力臣願陛下決意親征亦用寇凖已試之效如臣之末學智略疏淺豈敢不揆自方前哲惟是陛下聰明英睿真可勉力以繼祖宗金人二帥亦達蘭耳何足道哉只前此諸將畏怯無敢當之賣國縱敵遂致大變陛下若肯決意親征祖宗之心庶其在此祖宗在天天必相之天下之人皆知陛下坐薪嘗膽不忘戴天皆願捐軀一戰自效臣謂一旦行營北顧兩帥之頭可致麾下竊願陛下刻意圖此勿為東晉委靡之計臣近聞朝廷遣使奉迎神主欲往江南又見宗室遷居鎮江豈非朝廷必欲南去然臣又聞陛下降詔復還中原金人再來與之決戰果然即是神主不當逺去自古天子豈有不奉宗廟神主而獨居者陛下親征願載以行武王伐紂文王載之車中王乃言曰奉文王伐不敢自專臣願陛下奉若祖宗報怨金人何為不可又聞朝廷復請陛下南自襄鄧轉之長安臣雖至愚不足窺測廟堂之議然而鄙見陛下頃者先歸京師謁見宗廟慰安都人京師之人世世安處輦轂之地不識戰陳今遭兵火復失二帝攀戀悲思不能自處日夕引領願望陛下車駕還歸陛下萬一徑為他幸竊恐都人必生怨心乃謂陛下棄我而去臣願陛下早歸京師以定大勢鎮撫中外治兵選將速圖親征若以二聖六宫九族逺征之故顧瞻宫闕難以為懷必欲他幸亦須略到旋即他往仍須擇一二重臣賢有才德素為都人所倚仗者留守京師分兵四屯衛護宗廟然後可以保其無虞如或不然都人之心日夕惴栗安知其無英雄豪傑乘間而起畿甸之人誰不附之以求休息并或金人聞我既去謂必大怯即必擁兵衝突而至據有京師皆能坐障東南糧道未必更無南睨之意陛下雖曰已居京師豈能轉輸江淮之粟以餉關中是宜先圖固此京師然後徐為長安之計若曰便欲渡江而南自江以北即非我有反在他人指揮之下雖有大江不足恃也縱能立國不過東晉凌遲之漸又況方欲報怨金人金陵之名以其嫌忌有類柏人為此計者何未之思臣願陛下勿效東晉江左之行決為真皇澶淵之役宗社幸甚天下幸甚然非陛下大明誅賞以振國威未可圖也臣願陛下斷然行之臣布衣一介之賤學術淺陋無所取裁誤䝉陛下記録首賜追召臣不敢默默以負陛下所願陛下大明誅賞亟成中興之大業而已宣和七年冬十二月二十七日淵聖皇帝即位之五日臣時在太學為諸生嘗與同學生千百輩伏闕下獻書亦乞大明誅賞以示天下今日遭遇陛下亦首以大明誅賞為獻何也臣竊以謂誅賞人主之威柄也誅賞不明則主威不立而人無所畏將無以驅使天下不能驅使天下則安能折服北敵欲求內外無患而天下大治者其可得哉武王之伐紂乃在於畢力賞罰以定其功宣王之中興亦以其能賞善罰惡而已此宣帝之信賞必罰憲宗之能賞罰用命不用命所以為漢唐中興之君陛下操生殺之柄端可以賞罰靖天下而指揮四裔何憚而不為哉臣願陛下勉之而已干冒天威罪當萬死上髙宗皇帝第三書丹陽布衣臣陳東謹昧死再拜上書於皇帝陛下臣䝉恩追召已於今月十五日到行在十六日具狀申尚書省訖當日晚聞宰相李綱乞出臣即於十七日詣登聞檢院上書乞堅留李綱勿許去位力論黃潛善汪伯彥若在朝廷必害中興之業又於十九日再上書乞陛下用兵親征以邀還二聖又乞大明誅賞以振主威正前此諸將不進兵之罪以作士氣又乞車駕早歸京師勿幸金陵前後二書皆未䝉報但聞李綱被謫而出而黃潛善者專任宰司與汪伯彥等日益用事親征之詔不下誅賞之政不行雖未聞南幸之期而亦無歸京之耗是臣之言一無合於廟謨而臣之罪實難逃於國法倘䝉賜盡於陛下之威命臣死實甘心或恐遭害於權臣之毒手臣死不瞑目臣深慮黃潛善汪伯彥等怒臣議已必欲見害臣再三思之曷若盡言於陛下以求其死生之決庶幾父母之遺體不至於曖昧而歿也臣竊以李綱之為人也責以春秋之法不無可恨然其赤心事主不敢懷奸致身殉國無所顧避天下共知李綱之忠義足以輔相陛下之聖明奈何反遭小人之擠排終以直道而廢黜若黃潛善者素非端正之士而汪伯彥者蓋亦柔佞之徒天下皆知二人之奸邪深嫉李綱之正直今也果能馳騁一己之私意惑亂陛下之聰明陛下既為二人之所惑亂則賢人君子自然不見信用而必不能一日安身於朝廷之上矣此李綱之所以求去而被謫也李綱既去則誰為陛下以身任天下之責者是宜親征之詔不下則敵氣不折而二聖邈無回期誅賞之政不行則國威不振而三軍依然解體京師宗社之國也竊恐陛下未必得歸金陵荆楚之邦也竊恐陛下未必不往然亦聞尚書省有榜示備坐李綱請都江寧奏狀乃是綱被詔赴行在經由金陵之時有此啓李綱之罪也然天下只知綱到行在為宰相專主歸京之議而不聞堅執金陵之請如其堅執金陵之請則綱之罪不可恕矣若即更而為歸京之議則金陵之說乃綱昔日之言也請以今言為正豈可遺棄其後之是而掇拾其前之非乎臣竊意朝廷大臣忌綱之得人心故特訐綱前失欲使百姓怨之耳又自度必不敢身任歸京之計萬一不免南幸又欲歸咎於綱也是誠何心哉抑何淺鮮哉昔陳瓘謂蔡京愚弄朝廷幾同兒戲臣謂今諸大臣請揭此榜無乃愚弄君父聾瞽百姓有同兒戲乎自欺可也欺人可乎欺人可也欺天可乎觀朝廷出此一榜既已明知請遷都金陵為非䇿自今以後大臣必無勸陛下為江左之行者況陛下已有獨留中原之詔亦必不肯失信於天下也況聞近日盜發錢塘擒太守殺漕臣屠戮郡官吏甚衆又聞嚴州洞寇尚未殄滅江浙之間已大騷然嚴州趨江寧杭州趨鎮江各不過三四百里鎮江與江寧接境皆自沿江南岸要害之地萬一賊勢稍熾必先據此二州以為控扼則金陵之在今日豈是車駕巡幸之方乎兼聞近日東北餘寇數萬衆散走淮甸四散㳂汴諸處如虹縣青陽鎮等已遭冦劫臣謂雖太后行宫亦未可遽往也陛下亦知國家社稷僅復於已亡之餘天下恟恟人心未定而四方英雄豪傑所以不敢遽起割據自立者以陛下尚在中原而大勢未去故也若車駕南渡則英雄豪傑即日並起中原之地四分五裂矣諸郡守土之臣不免棄城而遁朝廷既棄中原而去則安能責人之失守也哉又況兩河之民所以孤城堅守雖困不下者想亦日望國勢壯盛軍威振赫庶幾强敵知畏不敢必取而尚得為中原之人其屬望於陛下者諒不勝其切至也陛下萬一必為江南之行則北人之望絶矣誰肯孤城堅拒以就死耶兩河之地又即日便歸敵籍矣敵騎定須衝突而來英雄豪傑必與之極力角勝則京畿淮甸皆是血戰之地自江以北陛下豈復得回首一顧乎大河不足恃則大江不足恃亦明矣金陵雖有大江之險陛下亦豈能帖帖定居此乎大江之南雖屬陛下然已在他人指揮之下矣是豈社稷長久之所哉臣竊以為一旦渡江則無復更有回日又安知無劉氏蕭陳之徒以相乘也凌遲之漸自此始矣臣固知陛下已斷然不為此行所以尚爾譊譊以畢其說者欲陛下通知南北利害之相遼决意早歸京師而已竊知都城之人已見太后為南去之計而未聞陛下有北歸之期悲嗟惴恐莫知所措今幸京師城壁既已修築復舊陛下倘能明賞罰以厲六軍盡誠愛以結百姓何為而不能守臣願陛下速歸京師謁見宗廟慰安都人之心大明誅賞以示天下使軍威士氣奮然大振於是治兵選將決策親征以回二聖之鑾輿然行營之遲速視事之緩急何如耳惟親征之詔不可不速下而親征之事不可不豫集庶幾折服敵氣而二聖鑾輿歸還有期臣竊惟戎醜之性莫可言喻趨而避之則貪噬不已逆而擊之則率先逸去願陛下勿怯也不然則二聖鑾輿豈有還日秋氣已髙天寒將至想見陛下思念父母兄弟漠北之苦日軫聖懷不勝痛切故不待臣區區之言也臣竊謂陛下必欲復中原以定大計再造王室以成中興之大業非用李綱不可蓋綱之所為雖未必一一皆當奈天下之人著意屬望皆願以為輔相者在綱而已綱今去國恐天下解體事難濟矣蘇軾有言未論行事之是非且觀人情之向背其綱之謂也臣切惟進退大臣天子之職非是細事必自有體大臣乞出必須堅留不從其請若從其請即使善去而又加恩數以遣焉至於有罪為臺諫論列不得已然後謫出而謫命之下必按臺諫章疏托實行詞乃者李綱蓋乞出也比見麻詞謫語甚峻不知詞臣何據而作豈朝廷大臣之惡綱者有以授之乎大臣只知欲快一時之私忿而不知有傷陛下進退大臣之體也臣竊怪臺諫之官陛下用之以司耳目乃今坐視朝廷之過舉而不為一言之救豈亦有所觀望乎使綱之罪審如詞語臺諫自當預言想綱在朝廷臺諫觀望而不敢言也若綱之罪不至是而詞臣有所授而為之則臺諫亦當論列想又觀望黃潛善汪伯彥之徒而不敢言也豈不辜負陛下耳目之任乎人主固當優容臺諫及其懷奸觀望如此尚可容乎願陛下處之臣竊謂黃潛善汪伯彥若不速去則必坐妨賢能之路鉗結忠義之口陛下將不得聞天下之言矣非社稷之福此臣所以反覆為陛下言之也伏念臣以一介疏賤仰荷陛下記録姓名即位十日首賜追召出自獨斷非有先容顧臣何人可以當此誓當捐軀圖報萬一敢以宗社大計獻於陛下干冒天威罪當萬死臣東昧死再拜少陽集卷三
